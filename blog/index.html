---
layout: default
title: English Blog
lang: en
permalink: /blog/
---

{% assign en_posts = site.posts | where: "lang", "en" %}
{% for post in en_posts %}
  <div class="card">
    <h3>{{ post.title }}</h3>
    <p>{{ post.excerpt | strip_html }}</p>
    <a href="{{ post.url }}">Read</a>
  </div>
{% endfor %}
