<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}" dir="{{ page.dir | default: 'ltr' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>{{ page.title }} | Mohammadreza Shafiei</title>
  <meta name="description" content="{{ page.description | default: 'Personal academic website of Mohammadreza Shafiei.' }}" />

  <link rel="stylesheet" href="/assets/style.css" />
</head>

<body class="{% if page.dir == 'rtl' %}rtl{% else %}ltr{% endif %}">
  <header class="site-header">
    <div class="container">
      {% if page.lang == "fa" %}
        <nav>
          <a href="/fa/">خانه</a>
          <a href="/fa/blog/">یادداشت‌ها</a>
          <a href="/about/">درباره من</a>
          <a href="/cv/">رزومه</a>
          <a href="/research/">پژوهش</a>
          <a href="/contact/">تماس</a>
          <a href="/">English</a>
        </nav>
      {% else %}
        <nav>
          <a href="/">Home</a>
          <a href="/blog/">Blog</a>
          <a href="/about/">About</a>
          <a href="/cv/">CV</a>
          <a href="/research/">Research</a>
          <a href="/contact/">Contact</a>
          <a href="/fa/">فارسی</a>
        </nav>
      {% endif %}
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      {% if page.lang == "fa" %}
        © ۲۰۲۶ محمدرضا شفیعی
      {% else %}
        © 2026 Mohammadreza Shafiei
      {% endif %}
    </div>
  </footer>
</body>
</html>
